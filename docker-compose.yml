# Local infrastructure for the nyc_cab_events package.
#
# Brings up a single-broker Kafka cluster, the Zookeeper it depends on, and a
# Postgres instance for the aggregate sink. Designed for the integration test
# suite (markers: kafka, postgres) and local hand-testing of the
# producer/consumer/sink pipeline.
#
# Topic auto-creation is off by design: the producer is responsible for
# explicitly creating its topics (trip.completed.v1 and
# trip.completed.v1.invalid) so the test bed mirrors the deployed surface.
#
# Container names are deterministic so test code can target them by name
# without compose project string interpolation.

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nyc_cab_events_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nyc_cab_events_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: nyc_cab_events_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: nyc_cab
      POSTGRES_PASSWORD: nyc_cab
      POSTGRES_DB: nyc_cab_events
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyc_cab -d nyc_cab_events"]
      interval: 5s
      timeout: 5s
      retries: 10
