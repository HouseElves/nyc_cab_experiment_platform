name: "CI"

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"

      - name: "Install with dev and events extras"
        # Events extras (confluent-kafka, psycopg) are required because the
        # nyc_cab_events package imports them at module level in the
        # producer and sink modules.
        run: "pip install -e .[dev,events]"

      - name: "Run pylint"
        # Package-directory invocation avoids spurious invalid-name warnings
        # on __init__.py files that file-by-file invocation produces. Both
        # packages are linted to the same 10/10 gate.
        run: "pylint nyc_cab/ nyc_cab_events/"

  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Set up Java for PySpark"
        # The test suite includes real Spark-backed module and integration
        # tests. Java is required; PySpark alone is not sufficient.
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"

      - name: "Install with dev and events extras"
        run: "pip install -e .[dev,events]"

      - name: "Run tests with coverage"
        # Mark exclusions:
        #   - "not live": TLC network downloads (pytest.mark.live)
        #   - "not kafka": tests requiring docker-compose Kafka broker
        #   - "not postgres": tests requiring docker-compose Postgres
        # CI runs Tier 1 (fast) and Tier 2 (Spark) together; Tier 3
        # integration runs are gated behind kafka/postgres marks and
        # require docker-compose services that this lane does not start.
        run: >-
          pytest -m "not live and not kafka and not postgres"
          --cov=nyc_cab
          --cov=nyc_cab_events
          --cov-config=.coveragerc
          --cov-branch
          --cov-fail-under=90

  import:
    name: "Import smoke test"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"
      - name: "Install runtime only"
        # Dev extras intentionally excluded: verifies the runtime dependency
        # set in pyproject.toml is self-contained and complete for the base
        # nyc_cab package. The nyc_cab_events package's runtime dependencies
        # live under the [events] optional-dependencies group and are
        # exercised separately by the lint and test jobs.
        run: "pip install -e ."
      - name: "Verify clean import"
        run: "python -c \"import nyc_cab; print('OK')\""
