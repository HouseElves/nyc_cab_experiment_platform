name: "CI"

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"

      - name: "Install with dev extras"
        run: "pip install -e .[dev]"

      - name: "Run pylint"
        # Package-directory invocation avoids spurious invalid-name warnings
        # on __init__.py files that file-by-file invocation produces.
        run: "pylint nyc_cab/"

  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Set up Java for PySpark"
        # The test suite includes real Spark-backed module and integration
        # tests. Java is required; PySpark alone is not sufficient.
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"

      - name: "Install with dev extras"
        run: "pip install -e .[dev]"

      - name: "Run tests with coverage"
        # -m "not live" excludes real TLC network downloads (pytest.mark.live).
        # Runs all Tier 1 (fast) and Tier 2 (Spark) tests together until
        # mark-based tier separation is implemented — see ci_architecture.md.
        run: >-
          pytest -m "not live"
          --cov=nyc_cab
          --cov-config=.coveragerc
          --cov-branch
          --cov-fail-under=90

  import:
    name: "Import smoke test"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: "Cache pip"
        uses: actions/cache@v4
        with:
          path: "~/.cache/pip"
          key: "pip-${{ hashFiles('pyproject.toml', 'requirements.lock.txt') }}"
      - name: "Install runtime only"
        # Dev extras intentionally excluded: verifies the runtime dependency
        # set in pyproject.toml is self-contained and complete.
        run: "pip install -e ."
      - name: "Verify clean import"
        run: "python -c \"import nyc_cab; print('OK')\""
