[pytest]
markers =
    live: marks tests that require network access to external services
    spark: marks tests that require a live PySpark session
    unit: marks pure-Python tests with no Spark or I/O dependency
    kafka: marks tests that require a live Kafka broker (docker-compose)
    postgres: marks tests that require a live Postgres instance (docker-compose)
pythonpath = .
testpaths =
    test
    nyc_cab/test
    nyc_cab/contracts/test
    nyc_cab/ingestion/test
    nyc_cab/orchestration/test
    nyc_cab/transform/test
    nyc_cab_events/contracts/test
    nyc_cab_events/producer/test
    nyc_cab_events/consumer/test
    nyc_cab_events/sink/test
python_files = *.py
python_functions = test_*
python_classes = Test*
addopts =
    --strict-config
    --strict-markers